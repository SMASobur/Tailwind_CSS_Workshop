<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFlow - Modern Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<!-- ========== NAVIGATION BAR ========== -->
<nav class="sticky top-0 bg-white/90 backdrop-blur-md shadow-sm z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <!-- Logo -->
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-r from-blue-600 to-purple-600 rounded-lg flex items-center justify-center">
                    <span class="text-white font-bold text-xl">K</span>
                </div>
                <span class="text-xl font-bold text-gray-800">KnitNox</span>
            </div>

            <!-- Desktop Navigation -->
            <div class="hidden md:flex gap-8">
                <a href="#features" class="text-gray-600 hover:text-blue-600 transition-colors">Features</a>
                <a href="#product" class="text-gray-600 hover:text-blue-600 transition-colors">Product</a>
                <a href="#pricing" class="text-gray-600 hover:text-blue-600 transition-colors">Pricing</a>
                <a href="#about" class="text-gray-600 hover:text-blue-600 transition-colors">About</a>
                <a href="#contact" class="text-gray-600 hover:text-blue-600 transition-colors">Contact</a>
            </div>

            <div class="hidden md:block">
                <button class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition-colors duration-300">
                    Get Started
                </button>
            </div>

            <!-- Mobile Menu Button -->
            <div class="md:hidden">
                <input type="checkbox" id="menu-toggle" class="hidden peer">
                <label for="menu-toggle" class="text-gray-600 hover:text-blue-600 cursor-pointer">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </label>

                <!-- Mobile Menu (Hidden by default, shown when checkbox checked) -->
                <div class="hidden peer-checked:block absolute left-0 right-0 top-16 bg-white shadow-lg border-t border-gray-100 p-4">
                    <div class="flex flex-col space-y-3">
                        <a href="#features" class="text-gray-600 hover:text-blue-600 transition-colors px-4 py-2 hover:bg-gray-50 rounded-md">Features</a>
                        <a href="#product" class="text-gray-600 hover:text-blue-600 transition-colors px-4 py-2 hover:bg-gray-50 rounded-md">Product</a>
                        <a href="#pricing" class="text-gray-600 hover:text-blue-600 transition-colors px-4 py-2 hover:bg-gray-50 rounded-md">Pricing</a>
                        <a href="#about" class="text-gray-600 hover:text-blue-600 transition-colors px-4 py-2 hover:bg-gray-50 rounded-md">About</a>
                        <a href="#contact" class="text-gray-600 hover:text-blue-600 transition-colors px-4 py-2 hover:bg-gray-50 rounded-md">Contact</a>
                        <button class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition-colors duration-300 w-full">
                            Get Started
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ========== HERO SECTION ========== -->
<section class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
    <div class="relative w-full h-96 rounded-lg overflow-hidden">
        <img src="https://picsum.photos/1200/600" alt="Hero Background" class="w-full h-full object-cover">

        <div class="absolute inset-0 bg-black/50"></div>

        <div class="absolute inset-0 flex items-center justify-center">
            <div class="text-center text-white px-4">
                <h2 class="text-4xl font-bold mb-4">Welcome to KnitNox</h2>
                <p class="text-xl mb-6">Your modern solution starts here.</p>
                <button class="bg-blue-600 text-white px-6 py-3 rounded-md hover:bg-blue-700 transition-colors duration-300">
                    Explore
                </button>
            </div>
        </div>
    </div>

</section>


</body>
</html>
